<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register | Lost & Found System</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    #password-msg {
      font-size: 0.85rem;
      margin-top: 0.25rem;
    }
  </style>
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center" style="height:100vh;">
  <div class="card shadow p-4" style="width: 420px; border-radius: 12px;">
    <h3 class="text-center mb-3">Create Account</h3>
    <p class="text-muted text-center">Register to report lost and found items</p>

    <input type="text" id="name" class="form-control mb-3" placeholder="Full Name">
    <input type="email" id="email" class="form-control mb-3" placeholder="Email">

    <div class="input-group mb-1">
      <input type="password" id="password" class="form-control" placeholder="Password">
      <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('password')">Show</button>
    </div>
    <p id="password-msg" class="text-danger mb-2">
      Password must have at least 8 characters, 1 uppercase, 1 lowercase, 1 number, 1 special character.
    </p>

    <button class="btn btn-success w-100 mb-3" id="register-btn">Register</button>

    <p class="text-center">Already have an account? <a href="login.html">Login</a></p>
    <p id="reg_msg" class="text-danger text-center mt-2"></p>
  </div>
</div>
  
<script src="js/auth.js"></script>
<script>
function togglePassword(inputId) {
  const pass = document.getElementById(inputId);
  pass.type = pass.type === "password" ? "text" : "password";
}

// Password validation
function validatePassword(password) {
  const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*()_+\-=[\]{};':"\\|,.<>/?]).{8,}$/;
  return regex.test(password);
}

// Email format validation
function validateEmail(email) {
  const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  return regex.test(email);
}

// Hook into your existing auth.js registration logic
document.getElementById("register-btn").addEventListener("click", function() {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (!name || !email || !password) {
    document.getElementById("reg_msg").textContent = "Please fill all fields.";
    return;
  }

  if (!validateEmail(email)) {
    document.getElementById("reg_msg").textContent = "Please enter a valid email address.";
    return;
  }

  if (!validatePassword(password)) {
    document.getElementById("reg_msg").textContent = "Password does not meet requirements.";
    return;
  }

  // Call your existing auth.js function that handles registration
  if (typeof registerUser === "function") {
    registerUser(name, email, password);
  } else {
    console.error("registerUser function not found in auth.js");
  }
});
</script>

</body>
</html>
