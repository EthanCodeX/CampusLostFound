<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Lost & Found System</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body{
      background: linear-gradient(135deg,#d5e6e0,#f3faf7);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
    }

    .register-wrapper{
      width:100%;
      max-width:1000px;
      background:white;
      border-radius:16px;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,0.07);
      display:flex;
    }

    .register-left{
      background:#008037;
      color:#3c6b60;
      padding:50px 40px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      width:45%;
      text-align:center;
    }

    .register-left img{
      width:170px;
      margin-bottom:20px;
      filter:drop-shadow(0 4px 8px rgba(0,0,0,0.15));
    }

    .register-left h3{
      font-weight:600;
      margin-bottom:10px;
      color: white;
    }

    .register-left p{
      color:white;
      font-size:20px;
    }

    .register-right{
      padding:50px 40px;
      width:55%;
      background:#ffffff;
    }

    .register-title{
      font-weight:600;
      margin-bottom:5px;
      color:#3c6b60;
    }

    .btn-success{
      background:#6fae9e;
      border:none;
    }

    .btn-success:hover{
      background:#5d9e8e;
    }

    .form-control{
      border-radius:8px;
      border:1px solid #dbece6;
    }

    .form-control:focus{
      border-color:#a6ccc0;
      box-shadow:0 0 0 0.15rem rgba(111,174,158,0.15);
    }

    #password-msg{
      font-size:0.85rem;
      margin-top:0.25rem;
    }

    .input-group button{
      border-radius:0 8px 8px 0;
    }

    @media (max-width:768px){

      .register-wrapper{
        flex-direction:column;
        margin:20px;
      }

      .register-left{
        width:100%;
        padding:35px 20px;
      }

      .register-left img{
        width:120px;
      }

      .register-right{
        width:100%;
        padding:30px 22px;
      }

      .form-control{
        height:45px;
      }

      .btn{
        height:45px;
      }

    }
  </style>
</head>

<body>

<div class="register-wrapper">

  <div class="register-left">
    <img src="assets/logo.png" alt="logo">
    <h3>Join Lost & Found</h3>
    <p>Create an account to report and track lost or found items on campus.</p>
  </div>

  <div class="register-right">

    <h3 class="register-title">
      <i class="fa-solid fa-user-plus"></i> Create Account
    </h3>

    <p class="text-muted mb-4">Register to report lost and found items</p>

    <input type="text" id="name" class="form-control mb-3" placeholder="Full Name">
    <input type="email" id="email" class="form-control mb-3" placeholder="Email">

    <div class="input-group mb-1">
      <input type="password" id="password" class="form-control" placeholder="Password">
      <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('password')">
        <i class="fa-solid fa-eye"></i>
      </button>
    </div>

    <p id="password-msg" class="text-danger mb-2">
      Password must have at least 8 characters, 1 uppercase, 1 lowercase, 1 number, 1 special character.
    </p>

    <button class="btn btn-success w-100 mb-3" id="register-btn">Register</button>

    <p class="text-center text-muted small">
      Already have an account? <a href="login.html">Login</a>
    </p>

    <p id="reg_msg" class="text-danger text-center mt-2"></p>

  </div>

</div>

<script src="js/auth.js"></script>

<script>
function togglePassword(inputId){
  const pass=document.getElementById(inputId);
  pass.type=pass.type==="password"?"text":"password";
}

function validatePassword(password){
  const regex=/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*()_+\-=[\]{};':"\\|,.<>/?]).{8,}$/;
  return regex.test(password);
}

function validateEmail(email){
  const regex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  return regex.test(email);
}

document.getElementById("register-btn").addEventListener("click",function(){
  const name=document.getElementById("name").value.trim();
  const email=document.getElementById("email").value.trim();
  const password=document.getElementById("password").value;

  if(!name||!email||!password){
    document.getElementById("reg_msg").textContent="Please fill all fields.";
    return;
  }

  if(!validateEmail(email)){
    document.getElementById("reg_msg").textContent="Please enter a valid email address.";
    return;
  }

  if(!validatePassword(password)){
    document.getElementById("reg_msg").textContent="Password does not meet requirements.";
    return;
  }

  if(typeof registerUser==="function"){
    registerUser(name,email,password);
  }else{
    console.error("registerUser function not found in auth.js");
  }
});
</script>

</body>
</html>
