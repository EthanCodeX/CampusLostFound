<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Report Found Item | Lost & Found</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-success p-3">
  <h4 class="text-white m-0">Report Found Item</h4>
  <div>
    <button class="btn btn-light btn-sm me-2" onclick="goBack()">Back</button>
    <button class="btn btn-light btn-sm" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="container mt-4">

  <!-- HERO REPORT SECTION -->
  <div class="card shadow text-center p-5 mb-4" style="background-color: #2c2c2c; color: #ffffff;">
    <h3 class="mb-3 fw-bold" style="color: #ffffff;">Found Something?</h3>
    <p class="mb-4 fw-semibold">
      Click the button below to submit your found item report.
    </p>

    <div class="d-flex justify-content-center">
      <button class="btn btn-warning btn-lg fw-bold px-5 py-3"
              data-bs-toggle="modal"
              data-bs-target="#foundModal"
              style="font-size: 1.2rem; width: 80%; max-width: 600px;">
        + CLICK HERE TO REPORT FOUND ITEM
      </button>
    </div>
  </div>

  <!-- LOST ITEMS TITLE -->
  <h5 class="mb-3">🔎 Lost Items (Check If Yours Is Here)</h5>

  <div class="row">

    <!-- FILTER COLUMN -->
    <div class="col-md-3 mb-3">
      <div class="card p-3 shadow">
        <h6>Filter Lost Items</h6>

        <label>Sort By:</label>
        <select id="sort-option" class="form-select mb-2">
          <option value="recent">Most Recent</option>
          <option value="oldest">Oldest</option>
        </select>

        <label>Category:</label>
        <select id="filter-category" class="form-select mb-2">
          <option value="">ALL CATEGORIES</option>
          <option>WALLET</option>
          <option>PHONE</option>
          <option>LAPTOP</option>
          <option>TABLET</option>
          <option>KEYS</option>
          <option>ID CARD</option>
          <option>STUDENT CARD</option>
          <option>BAG</option>
          <option>CLOTHES</option>
          <option>ACCESSORIES</option>
          <option>BOOK</option>
          <option>OTHER</option>
        </select>

        <button type="button" class="btn btn-primary w-100" onclick="applyLostFilter()">Search</button>
      </div>
    </div>

    <!-- LOST ITEMS LIST -->
    <div class="col-md-9">
      <div id="lost-list" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3"></div>
    </div>

  </div>
</div>

<!-- MODAL FORM FOR FOUND ITEM -->
<div class="modal fade" id="foundModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Report Found Item</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form id="foundForm" enctype="multipart/form-data">

          <div class="mb-3">
            <label class="form-label">Item Name *</label>
            <input type="text" id="found-title" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea id="found-description" class="form-control"></textarea>
          </div>

          <div class="mb-3">
            <label class="form-label">Category *</label>
            <select id="found-category" class="form-select" required>
              <option value="">-- SELECT CATEGORY --</option>
              <option>WALLET</option>
              <option>PHONE</option>
              <option>LAPTOP</option>
              <option>TABLET</option>
              <option>KEYS</option>
              <option>ID CARD</option>
              <option>STUDENT CARD</option>
              <option>BAG</option>
              <option>CLOTHES</option>
              <option>ACCESSORIES</option>
              <option>BOOK</option>
              <option>OTHER</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Location *</label>
            <input type="text" id="found-location" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Date *</label>
            <input type="date" id="found-date" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Contact Info *</label>
            <input type="text" id="found-contact" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Upload Picture</label>
            <input type="file" id="found-image" class="form-control" accept="image/*">
          </div>

          <button type="submit" class="btn btn-success w-100">Submit Found Report</button>
          <p id="found-msg" class="mt-2 text-danger"></p>

        </form>
      </div>

    </div>
  </div>
</div>

<!-- MODAL FOR ITEM DETAILS -->
<div class="modal fade" id="itemDetailModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="detail-title"></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body" id="detail-body">
        <!-- Content will be populated dynamically -->
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>

    </div>
  </div>
</div>

<!-- DEFERRED SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>
<script src="js/common.js" defer></script>
<script src="js/found.js" defer></script>
<script src="js/lost-display.js" defer></script>
<script src="js/item-detail.js" defer></script>
</body>
</html>
