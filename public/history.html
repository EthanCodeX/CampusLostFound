<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Reports | Lost & Found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body {
      background: linear-gradient(135deg, #d5e6e0, #eaf5ef);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    nav {
      background: #00664a;
    }

    nav h4 {
      color: #ffffff;
      font-weight: 600;
      margin: 0;
      font-size: 1.2rem;
    }

    nav button {
      font-weight: 500;
    }

    h3.section-title {
      color: #00664a;
      font-weight: 700;
      margin: 20px 0 10px 0;
      font-size: 1rem;
      border-bottom: 2px solid #004d38;
      padding-bottom: 5px;
    }

    table.card-table {
      table-layout: fixed;
      width: 100%;
      background: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
      font-size: 0.9rem;
    }

    table.card-table th,
    table.card-table td {
      word-wrap: break-word;
      overflow-wrap: break-word;
      vertical-align: middle;
      text-align: center;
      padding: 0.4rem 0.3rem;
    }

    thead.table-dark {
      background-color: #00664a !important;
      color: #ffffff;
    }

    td div.d-flex {
      justify-content: center;
      flex-wrap: wrap;
      gap: 5px;
    }

    img {
      max-width: 50px;
      max-height: 50px;
      object-fit: cover;
      border-radius: 6px;
    }

    .table-responsive {
      overflow-x: auto;
      margin-bottom: 30px;
    }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      nav h4 {
        font-size: 1rem;
      }

      table.card-table th,
      table.card-table td {
        font-size: 0.75rem;
        padding: 0.3rem 0.2rem;
      }

      table.card-table th:nth-child(1),
      table.card-table td:nth-child(1) { width: 40px; }   /* Image */
      table.card-table th:nth-child(2),
      table.card-table td:nth-child(2) { width: 80px; }  /* Category */
      table.card-table th:nth-child(3),
      table.card-table td:nth-child(3) { width: 90px; }  /* Location */
      table.card-table th:nth-child(4),
      table.card-table td:nth-child(4) { width: 70px; }  /* Date */
      table.card-table th:nth-child(5),
      table.card-table td:nth-child(5) { width: 60px; }  /* Status */
      table.card-table th:nth-child(6),
      table.card-table td:nth-child(6) { width: 80px; }  /* Action buttons */

      img {
        max-width: 40px;
        max-height: 40px;
      }

      h3.section-title {
        font-size: 0.9rem;
        margin-top: 15px;
      }
    }
  </style>
</head>

<body>

<nav class="navbar navbar-dark p-3 d-flex justify-content-between">
  <h4>My Reports</h4>
  <div>
    <button class="btn btn-light btn-sm me-2" onclick="goBack()">Back</button>
    <button class="btn btn-light btn-sm" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="container mt-4">

  <!-- LOST ITEMS -->
  <h3 class="section-title">Lost Items You Reported</h3>
  <div class="table-responsive">
    <table class="table table-bordered table-hover shadow card-table">
      <thead class="table-dark">
        <tr>
          <th>Image</th>
          <th>Category</th>
          <th>Location</th>
          <th>Date</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="lostBody">
        <tr><td colspan="6" class="text-center">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- FOUND ITEMS -->
  <h3 class="section-title">Found Items You Reported</h3>
  <div class="table-responsive">
    <table class="table table-bordered table-hover shadow card-table">
      <thead class="table-dark">
        <tr>
          <th>Image</th>
          <th>Category</th>
          <th>Location</th>
          <th>Date</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="foundBody">
        <tr><td colspan="6" class="text-center">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- CLOSED ITEMS -->
  <h3 class="section-title">Resolved Reports</h3>
  <div class="table-responsive">
    <table class="table table-bordered table-hover shadow card-table">
      <thead class="table-dark">
        <tr>
          <th>Image</th>
          <th>Category</th>
          <th>Location</th>
          <th>Date</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="closedBody">
        <tr><td colspan="6" class="text-center">Loading...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script src="js/common.js"></script>
<script src="js/history.js"></script>
</body>
</html>
