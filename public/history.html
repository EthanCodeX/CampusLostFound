<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Reports | Lost & Found</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Remove max-width to allow full responsiveness */
    .container {
      width: 100%;
      padding: 0 15px;
    }

    table.card-table {
      table-layout: fixed;
      width: 100%;
    }

    table.card-table th,
    table.card-table td {
      word-wrap: break-word;
      overflow-wrap: break-word;
      vertical-align: middle;
      text-align: center;
    }

    /* Column widths */
    table.card-table th:nth-child(1),
    table.card-table td:nth-child(1) { width: 80px; }   /* Image */
    table.card-table th:nth-child(2),
    table.card-table td:nth-child(2) { width: 120px; }  /* Category */
    table.card-table th:nth-child(3),
    table.card-table td:nth-child(3) { width: 150px; }  /* Location */
    table.card-table th:nth-child(4),
    table.card-table td:nth-child(4) { width: 100px; }  /* Date */
    table.card-table th:nth-child(5),
    table.card-table td:nth-child(5) { width: 100px; }  /* Status */
    table.card-table th:nth-child(6),
    table.card-table td:nth-child(6) { width: 150px; }  /* Action buttons */

    /* Buttons wrap */
    td div.d-flex {
      justify-content: center;
      flex-wrap: wrap;
      gap: 5px;
    }

    img {
      max-width: 60px;
      max-height: 60px;
      object-fit: cover;
      border-radius: 4px;
    }

    /* Responsive adjustments for small screens */
    @media (max-width: 768px) {
      table.card-table th,
      table.card-table td {
        font-size: 0.85rem;
        padding: 0.4rem;
      }

      table.card-table th:nth-child(1),
      table.card-table td:nth-child(1) { width: 60px; }

      table.card-table th:nth-child(2),
      table.card-table td:nth-child(2) { width: 100px; }

      table.card-table th:nth-child(3),
      table.card-table td:nth-child(3) { width: 120px; }

      table.card-table th:nth-child(4),
      table.card-table td:nth-child(4) { width: 80px; }

      table.card-table th:nth-child(5),
      table.card-table td:nth-child(5) { width: 80px; }

      table.card-table th:nth-child(6),
      table.card-table td:nth-child(6) { width: 120px; }

      img {
        max-width: 50px;
        max-height: 50px;
      }
    }

    /* Horizontal scroll wrapper */
    .table-responsive {
      overflow-x: auto;
    }
  </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary p-3 d-flex justify-content-between">
  <h4 class="text-white m-0">My Reports</h4>
  <div>
    <button class="btn btn-light btn-sm me-2" onclick="goBack()">Back</button>
    <button class="btn btn-light btn-sm" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="container mt-4">

  <!-- LOST ITEMS -->
  <h3 class="mb-3">Lost Items You Reported</h3>
  <div class="table-responsive">
    <table class="table table-bordered table-hover shadow card-table">
      <thead class="table-dark">
        <tr>
          <th>Image</th>
          <th>Category</th>
          <th>Location</th>
          <th>Date</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="lostBody">
        <tr><td colspan="6" class="text-center">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- FOUND ITEMS -->
  <h3 class="mt-5 mb-3">Found Items You Reported</h3>
  <div class="table-responsive">
    <table class="table table-bordered table-hover shadow card-table">
      <thead class="table-dark">
        <tr>
          <th>Image</th>
          <th>Category</th>
          <th>Location</th>
          <th>Date</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="foundBody">
        <tr><td colspan="6" class="text-center">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- CLOSED ITEMS -->
  <h3 class="mt-5 mb-3">Resolved Reports</h3>
  <div class="table-responsive">
    <table class="table table-bordered table-hover shadow card-table">
      <thead class="table-dark">
        <tr>
          <th>Image</th>
          <th>Category</th>
          <th>Location</th>
          <th>Date</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="closedBody">
        <tr><td colspan="6" class="text-center">Loading...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script src="js/common.js"></script>
<script src="js/history.js"></script>
</body>
</html>
