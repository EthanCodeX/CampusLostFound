<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Report Lost Item | Lost & Found</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary p-3">
  <h4 class="text-white m-0">Report Lost Item</h4>
  <div>
    <button class="btn btn-light btn-sm me-2" onclick="goBack()">Back</button>
    <button class="btn btn-light btn-sm" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="container mt-4">

  <!-- REPORT FORM -->
  <div class="card p-4 shadow mb-5">
    <h5 class="mb-3">Lost Item Details</h5>

    <form id="lostForm" enctype="multipart/form-data">

      <div class="mb-3">
        <label class="form-label">Item Name *</label>
        <input type="text" id="lost-title" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea id="lost-description" class="form-control"></textarea>
      </div>

      <div class="mb-3">
        <label class="form-label">Category *</label>
        <select id="lost-category" class="form-select" required>
          <option value="">-- Select Category --</option>
          <option>Wallet</option>
          <option>Phone</option>
          <option>Laptop</option>
          <option>Tablet</option>
          <option>Keys</option>
          <option>ID Card</option>
          <option>Student Card</option>
          <option>Bag</option>
          <option>Clothes</option>
          <option>Accessories</option>
          <option>Book</option>
          <option>Other</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Location *</label>
        <input type="text" id="lost-location" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Date Lost *</label>
        <input type="date" id="lost-date" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Contact Info *</label>
        <input type="text" id="lost-contact" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Upload Picture</label>
        <input type="file" id="lost-image" class="form-control" accept="image/*">
      </div>

      <button type="submit" class="btn btn-success w-100">Submit Lost Report</button>
      <p id="lost-msg" class="mt-2 text-danger"></p>

    </form>
  </div>

  <!-- FOUND ITEMS DISPLAY -->
  <div class="row">
    <!-- FILTER/OPTIONS COLUMN -->
    <div class="col-md-3 mb-3">
      <div class="card p-3 shadow">
        <h6>Filter Found Items</h6>
        <label>Sort By:</label>
        <select id="sort-option" class="form-select mb-2">
          <option value="recent">Most Recent</option>
          <option value="oldest">Oldest</option>
        </select>

        <label>Category:</label>
        <select id="filter-category" class="form-select mb-2">
          <option value="">ALL CATEGORIES</option>
          <option value="WALLET">WALLET</option>
          <option value="PHONE">PHONE</option>
          <option value="LAPTOP">LAPTOP</option>
          <option value="TABLET">TABLET</option>
          <option value="KEYS">KEYS</option>
          <option value="ID CARD">ID CARD</option>
          <option value="STUDENT CARD">STUDENT CARD</option>
          <option value="BAG">BAG</option>
          <option value="CLOTHES">CLOTHES</option>
          <option value="ACCESSORIES">ACCESSORIES</option>
          <option value="BOOK">BOOK</option>
          <option value="OTHER">OTHER</option>
        </select>

        <button type="button" class="btn btn-primary w-100" onclick="applyFilter()">Search</button>
      </div>
    </div>

    <!-- FOUND ITEMS LIST -->
    <div class="col-md-9">
      <div id="found-list" class="row row-cols-1 row-cols-md-2 g-3"></div>
    </div>
  </div>

</div>

<script src="js/common.js"></script>
<script src="js/lost.js"></script>
<script src="js/found-display.js"></script>
</body>
</html>
