<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Report Lost Item | Lost & Found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

  <style>
    body{
      background: linear-gradient(135deg, #e8efff, #004aad);
      min-height: 100vh;
      font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
    }

    nav{
      background:#004aad;
    }

    nav h4{
      color:white;
      font-weight:600;
      margin:0;
    }

    nav button{
      font-weight:500;
    }

    .hero-card{
      background: rgba(255,255,255,0.95);
      border-radius: 18px;
      padding: 40px 20px;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0,0,0,0.1);
      margin-bottom: 30px;
    }

    .hero-card h3{
      color:#004aad;
      font-weight:700;
      margin-bottom: 15px;
    }

    .hero-card p{
      color:#4a5a7c;
      font-weight:500;
      margin-bottom:25px;
    }

    .btn-report{
      background:#004aad;
      color:white;
      font-weight:600;
      padding:15px 20px;
      border-radius:10px;
      border:none;
      width:80%;
      max-width:500px;
    }

    .btn-report:hover{
      background:#003b8c;
    }

    .filter-card{
      background:#f2f7ff;
      border-radius:12px;
      padding:20px;
      box-shadow:0 6px 20px rgba(0,0,0,0.08);
    }

    .filter-card h6{
      font-weight:600;
      margin-bottom:12px;
      color:#004aad;
    }

    #found-list .card{
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 6px 20px rgba(0,0,0,0.08);
      transition:0.25s;
    }

    #found-list .card:hover{
      transform:translateY(-5px);
      box-shadow:0 8px 25px rgba(0,0,0,0.12);
    }

    @media(max-width:768px){
      .row > .col-md-3{
        margin-bottom:20px;
      }

      .btn-report{
        width:100%;
      }

      .hero-card{
        padding:30px 15px;
      }

      .filter-card{
        padding:15px;
      }
    }
  </style>
</head>

<body>

<nav class="navbar navbar-dark p-3 d-flex justify-content-between align-items-center shadow">
  <h4>Report Lost Item</h4>
  <div>
    <button class="btn btn-light btn-sm me-2" onclick="goBack()">Back</button>
    <button class="btn btn-light btn-sm" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="container mt-4">

  <!-- HERO REPORT SECTION -->
  <div class="hero-card">
    <h3>Lost Something?</h3>
    <p>Click the button below to submit your lost item report.</p>
    <button class="btn btn-report fw-bold" data-bs-toggle="modal" data-bs-target="#lostModal">
      + CLICK HERE TO REPORT LOST ITEM
    </button>
  </div>

  <!-- FOUND ITEMS TITLE -->
  <h5 class="mb-3" style="color:#004aad;">🔎 Found Items (Check If Yours Is Here)</h5>

  <!-- FILTER + ITEMS -->
  <div class="row">

    <!-- FILTER COLUMN -->
    <div class="col-md-3 mb-3">
      <div class="filter-card">
        <h6>Filter Found Items</h6>

        <label>Sort By:</label>
        <select id="sort-option" class="form-select mb-2">
          <option value="recent">Most Recent</option>
          <option value="oldest">Oldest</option>
        </select>

        <label>Category:</label>
        <select id="filter-category" class="form-select mb-2">
          <option value="">ALL CATEGORIES</option>
          <option>WALLET</option>
          <option>PHONE</option>
          <option>LAPTOP</option>
          <option>TABLET</option>
          <option>KEYS</option>
          <option>ID CARD</option>
          <option>STUDENT CARD</option>
          <option>BAG</option>
          <option>CLOTHES</option>
          <option>ACCESSORIES</option>
          <option>BOOK</option>
          <option>OTHER</option>
        </select>

        <button type="button" class="btn btn-primary w-100" onclick="applyFoundFilter()">Search</button>
      </div>
    </div>

    <!-- FOUND ITEMS LIST -->
    <div class="col-md-9">
      <div id="found-list" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3"></div>
    </div>

  </div>
</div>

<!-- MODAL FORM FOR LOST ITEM -->
<div class="modal fade" id="lostModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Report Lost Item</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form id="lostForm" enctype="multipart/form-data">

          <div class="mb-3">
            <label class="form-label">Item Name *</label>
            <input type="text" id="lost-title" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea id="lost-description" class="form-control"></textarea>
          </div>

          <div class="mb-3">
            <label class="form-label">Category *</label>
            <select id="lost-category" class="form-select" required>
              <option value="">-- SELECT CATEGORY --</option>
              <option>WALLET</option>
              <option>PHONE</option>
              <option>LAPTOP</option>
              <option>TABLET</option>
              <option>KEYS</option>
              <option>ID CARD</option>
              <option>STUDENT CARD</option>
              <option>BAG</option>
              <option>CLOTHES</option>
              <option>ACCESSORIES</option>
              <option>BOOK</option>
              <option>OTHER</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Location *</label>
            <input type="text" id="lost-location" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Date *</label>
            <input type="date" id="lost-date" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Contact Info *</label>
            <input type="text" id="lost-contact" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Upload Picture</label>
            <input type="file" id="lost-image" class="form-control" accept="image/*">
          </div>

          <button type="submit" class="btn btn-primary w-100">Submit Lost Report</button>
          <p id="lost-msg" class="mt-2 text-danger"></p>

        </form>
      </div>

    </div>
  </div>
</div>

<!-- MODAL FOR ITEM DETAILS -->
<div class="modal fade" id="itemDetailModal2" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="detail-title"></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body" id="detail-body">
        <!-- Content will be populated dynamically here -->
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>
<script src="js/common.js" defer></script>
<script src="js/lost.js" defer></script>
<script src="js/found-display.js" defer></script>
<script src="js/item-detail.js" defer></script>
</body>
</html>
